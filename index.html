<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MedConnect 2.0 — Plateforme médicale sécurisée. Identités vérifiées, confidentialité maximale, synchronisation temps réel.">
  <title>MedConnect 2.0</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0EA5E9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MedConnect">
  <link rel="apple-touch-icon" href="assets/icon.png">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/establishments-balance.css">
  <link rel="stylesheet" href="css/hospital-desktop.css">
  <link rel="stylesheet" href="css/medical-record-desktop.css">
  <link rel="stylesheet" href="css/mobile-layout-fixes.css">

  <!-- Firebase SDK (v9 compat) -->
  <script defer src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- AUTH -->
  <div id="auth-screen" style="display:none"></div>

  <!-- LANDING -->
  <div id="landing" style="display:none">
    <div class="landing-top-bar">
      <div id="lang-selector-container"></div>
      <button class="btn btn-ghost btn-sm" onclick="App.toggleTheme()">🌓</button>
    </div>
    <div class="landing-logo">🏥</div>
    <h1 class="landing-title">MedConnect</h1>
    <p class="landing-subtitle" id="landing-subtitle">Plateforme Médicale Universelle Sécurisée</p>
    <div style="margin-top:1.5rem;text-align:center">
      <button class="btn btn-primary" onclick="Auth.showLogin()"
              style="font-size:1rem;padding:.85rem 2.5rem;border-radius:12px">
        🔐 Se connecter
      </button>
    </div>
    <p style="margin-top:1.5rem;color:var(--text-muted);font-size:.77rem;text-align:center">
      Identités vérifiées · Confidentialité maximale · 195 pays
    </p>
  </div>

  <!-- MOBILE MENU -->
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>

  <!-- APP LAYOUT -->
  <div class="app-layout" id="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand" id="sidebar-brand"><span>🏥</span> MedConnect</div>
        <div id="hospital-switcher-container"></div>
        <button class="sidebar-back" id="sidebar-back-btn" onclick="Auth.logout()">
          🚪 Déconnexion
        </button>
      </div>
      <ul class="sidebar-nav" id="sidebar-nav"></ul>
      <div class="sidebar-footer">
        <div id="sync-badge-container"></div>
        <div id="sidebar-lang-container"></div>
        <div class="sidebar-user" id="sidebar-user"></div>
        <p style="font-size:.67rem;color:var(--text-dim);margin-top:.3rem">MedConnect v2.0 © 2026</p>
        <p style="font-size:.65rem;color:var(--text-dim)">📞 +243 856 373 707</p>
      </div>
    </aside>
    <main class="main-content" id="main-content"></main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="global-modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">—</h2>
        <button class="modal-close" onclick="App.closeModal()" aria-label="Fermer">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOASTS -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- ══════════════ SCRIPTS (ordre crucial) ══════════════ -->
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- 1. Config Firebase (remplir les valeurs dans ce fichier) -->
  <script defer src="js/firebase-config.js"></script>

  <!-- 2. Modules de base -->
  <script defer src="js/i18n.js"></script>
  <script defer src="js/db.js"></script>
  <script defer src="js/exchange-bridge.js"></script>
  <script defer src="js/medical-record-sharing.js"></script>
  <script defer src="js/emergency-transfer.js"></script>
  <script defer src="js/sync-badge.js"></script>

  <!-- Bundle desktop hôpital (adapté) : couche cloud, permissions,
       modules métier, puis shell plein écran séparé -->
  <script defer src="js/cloud-db.js"></script>
  <script defer src="js/hospital-permissions.js"></script>
  <script defer src="js/hospital-capabilities.js"></script>
  <script defer src="js/hospital-i18n.js"></script>
  <script defer src="js/hospital-subscription.js"></script>
  <script defer src="js/medical-ai.js"></script>
  <script defer src="js/hospital-beds.js"></script>
  <script defer src="js/hospital-lab.js"></script>
  <script defer src="js/hospital-desktop-ui.js"></script>
  <script defer src="js/medical-record-desktop.js"></script>
  <script defer src="js/hospital-reception.js"></script>
  <script defer src="js/hospital-emergency.js"></script>
  <script defer src="js/hospital-auth.js"></script>
  <script defer src="js/currency.js"></script>
  <script defer src="js/access_control.js"></script>
  <script defer src="js/haptic_feedback.js"></script>

  <!-- 3. Modules fonctionnels -->
  <script defer src="js/transfer_service.js"></script>
  <script defer src="js/network.js"></script>
  <script defer src="js/inbox_message_controls.js"></script>
  <script defer src="js/transfer_ui_patch.js"></script>
  <script defer src="js/hospitals_registry.js"></script>
  <script defer src="js/timeline.js"></script>
  <script defer src="js/appointments.js"></script>
  <script defer src="js/lab.js"></script>
  <script defer src="js/map.js"></script>

  <!-- 4. Portails -->
  <script defer src="js/patient.js"></script>
  <script defer src="js/hospital.js"></script>
  <script defer src="js/pharmacy.js"></script>
  <script defer src="js/share.js"></script>
  <script defer src="js/prescription-flow-fix.js"></script>

  <!-- 5. Admin & Settings -->
  <script defer src="js/admin.js"></script>
  <script defer src="js/settings.js"></script>

  <!-- 6. Auth & App (en dernier) -->
  <script defer src="js/auth.js"></script>
  <script defer src="js/registration-submit-flow.js"></script>
  <script defer src="js/app.js"></script>
  <script defer src="js/global_back_button.js"></script>
  <script defer src="js/patient_edit_guard.js"></script>
  <script defer src="js/auth-ui-cleanup.js"></script>
  <script defer src="js/affiliation-cleanup.js"></script>

  <!-- 7. Gestion des versions / mises à jour (PWA + Android + Desktop) -->
  <script defer src="js/version-manager.js"></script>

  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .catch(() => {});
    }
  </script>
</body>
</html>
