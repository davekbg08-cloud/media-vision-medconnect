<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MedConnect 2.0 — Plateforme médicale sécurisée. Identités vérifiées, confidentialité maximale, accès basé sur les rôles.">
  <title>MedConnect 2.0 — Plateforme Médicale Sécurisée</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0EA5E9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- AUTH -->
  <div id="auth-screen" style="display:none"></div>

  <!-- LANDING (accès rapide sans auth) -->
  <div id="landing" style="display:none">
    <div class="landing-top-bar">
      <div id="lang-selector-container"></div>
      <button class="btn btn-ghost btn-sm" onclick="App.toggleTheme()">🌓</button>
    </div>
    <div class="landing-logo">🏥</div>
    <h1 class="landing-title">MedConnect</h1>
    <p class="landing-subtitle" id="landing-subtitle">Plateforme Médicale Universelle · Sécurisée</p>
    <div style="margin-top:1rem;text-align:center">
      <button class="btn btn-primary" onclick="Auth.showLogin()" style="font-size:1rem;padding:.75rem 2rem">
        🔐 Se connecter
      </button>
    </div>
    <p style="margin-top:1.5rem;color:var(--text-muted);font-size:.77rem;text-align:center">
      Identités vérifiées · Confidentialité maximale · 195 pays
    </p>
  </div>

  <!-- MOBILE MENU -->
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>

  <!-- APP -->
  <div class="app-layout" id="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand" id="sidebar-brand"><span>🏥</span> MedConnect</div>
        <!-- Sélecteur d'hôpital pour médecins -->
        <div id="hospital-switcher-container"></div>
        <button class="sidebar-back" id="sidebar-back-btn" onclick="Auth.logout()">🚪 Déconnexion</button>
      </div>
      <ul class="sidebar-nav" id="sidebar-nav"></ul>
      <div class="sidebar-footer">
        <div id="sidebar-lang-container"></div>
        <div class="sidebar-user" id="sidebar-user"></div>
        <p style="font-size:.67rem;color:var(--text-dim)">MedConnect v2.0 © 2026</p>
      </div>
    </aside>
    <main class="main-content" id="main-content"></main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="global-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">—</h2>
        <button class="modal-close" onclick="App.closeModal()">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOASTS -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- SCRIPTS (ordre crucial) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script src="js/currency.js"></script>
  <script src="js/access_control.js"></script>
  <script src="js/network.js"></script>
  <script src="js/hospitals_registry.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/appointments.js"></script>
  <script src="js/lab.js"></script>
  <script src="js/map.js"></script>
  <script src="js/patient.js"></script>
  <script src="js/hospital.js"></script>
  <script src="js/pharmacy.js"></script>
  <script src="js/share.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('✅ MedConnect 2.0 PWA'))
        .catch(e => console.warn('SW:', e));
    }
  </script>
</body>
</html>
