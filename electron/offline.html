<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MedConnect — Connexion indisponible</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    height: 100%; margin: 0;
    background: #0f172a; color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  }
  body {
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    max-width: 420px; text-align: center; padding: 2.5rem 2rem;
    background: #1e293b; border-radius: 14px;
    border: 1px solid rgba(255,255,255,.08);
  }
  .icon { font-size: 3rem; margin-bottom: .75rem; }
  h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
  p { font-size: .9rem; color: #94a3b8; line-height: 1.6; margin: 0 0 1.5rem; }
  button {
    font-size: .95rem; font-weight: 600; padding: .65rem 1.5rem;
    border-radius: 8px; border: none; cursor: pointer;
    background: #0ea5e9; color: #fff;
  }
  button:hover { background: #0284c7; }
  .hint { font-size: .75rem; color: #64748b; margin-top: 1.25rem; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Connexion à MedConnect indisponible</h1>
    <p>
      Impossible de joindre le serveur MedConnect pour le moment.
      Vérifiez votre connexion internet, puis réessayez.
    </p>
    <button onclick="retry()">🔄 Réessayer</button>
    <p class="hint">MedConnect Desktop nécessite une connexion internet active.</p>
  </div>
  <script>
    // La cible réelle (APP_URL, définie côté processus principal —
    // main.js) est transmise en paramètre pour que "Réessayer" recharge
    // MedConnect et non cette page hors-ligne elle-même.
    function retry() {
      const target = new URLSearchParams(location.search).get('target');
      location.href = target ? decodeURIComponent(target) : location.href;
    }
  </script>
</body>
</html>
