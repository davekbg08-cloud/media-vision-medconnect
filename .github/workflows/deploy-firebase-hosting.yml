name: Déploiement Firebase Hosting

# Déclenchement manuel UNIQUEMENT — même principe que le déploiement des
# règles Firestore : publier le site est une action délibérée. Réutilise
# le secret FIREBASE_SERVICE_ACCOUNT_JSON déjà configuré (voir
# docs/BACKUP_RESTORE_RUNBOOK.md) — aucun nouveau secret requis.
# NB : l'hébergement principal reste GitHub Pages (l'APK charge la PWA
# depuis github.io) ; Firebase Hosting est un miroir secondaire
# (medconnect-e81ba.web.app), utile notamment pour la page /privacy.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-hosting:
    name: firebase deploy --only hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Vérifier le secret requis
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON" || (echo "Secret manquant : FIREBASE_SERVICE_ACCOUNT_JSON (voir docs/BACKUP_RESTORE_RUNBOOK.md)" && exit 1)

      - name: Écrire la clé de compte de service
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-service-account.json

      - name: Déployer le hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: npx firebase-tools@latest deploy --only hosting --project medconnect-e81ba --non-interactive

      - name: Supprimer la clé décodée
        if: always()
        run: rm -f /tmp/firebase-service-account.json
