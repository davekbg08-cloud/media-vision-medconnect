name: Build MedConnect Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'index.html'
      - 'js/**'
      - 'css/**'
      - 'sw.js'
      - 'manifest.json'
      - 'config/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tests/**'
      - '.github/workflows/build-medconnect-apk.yml'

permissions:
  contents: read

env:
  APK_NAME: medconnect-v2.4.apk

jobs:
  test:
    name: Tests web MedConnect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

  build-apk:
    name: Build signed APK v2.4
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Validate signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || (echo "Missing secret: KEYSTORE_BASE64" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "Missing secret: KEYSTORE_PASSWORD" && exit 1)
          test -n "$KEYSTORE_ALIAS" || (echo "Missing secret: KEYSTORE_ALIAS" && exit 1)
          test -n "$KEYSTORE_KEY_PASSWORD" || (echo "Missing secret: KEYSTORE_KEY_PASSWORD" && exit 1)

      - name: Decode and setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
          ls -lh android/keystore.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storeFile=keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEYSTORE_ALIAS
          keyPassword=$KEYSTORE_KEY_PASSWORD
          EOF

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Prepare APK artifact
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/app-release.apk "build-output/${APK_NAME}"
          ls -lh build-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medconnect-v2.4-apk
          path: build-output/medconnect-v2.4.apk
          if-no-files-found: error
