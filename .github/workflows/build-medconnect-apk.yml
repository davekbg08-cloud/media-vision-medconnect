name: Build MedConnect Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'index.html'
      - 'js/**'
      - 'css/**'
      - 'sw.js'
      - 'manifest.json'
      - 'config/**'
      - 'assets/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tests/**'
      - '.github/workflows/build-medconnect-apk.yml'

permissions:
  contents: read

env:
  APK_NAME: medconnect-v2.6.0.apk

jobs:
  test:
    name: Tests web MedConnect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # PARTIE O — ordre imposé : secrets → tests unitaires → règles
      # Firestore, avant tout build Android. Le build APK ne démarre
      # que si tout ce job réussit (déjà garanti par "needs: test").
      - name: Scan de secrets
        run: npm run security:scan

      - name: Run test suite
        run: npm test

      - name: Set up JDK (émulateur Firestore)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Tests des règles Firestore (émulateur)
        run: npm run test:rules

  build-apk:
    name: Build signed APK v2.6.0
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Sync web assets into Android app
        # android/app/src/main/assets/ était une copie figée à la main
        # (via sync-assets.ps1, un script Windows jamais lancé en CI) :
        # l'APK a longtemps été construit avec une version de l'app web
        # potentiellement périmée (constaté : tout le module desktop
        # hôpital et config/app-version.json manquaient). On resynchronise
        # ici depuis la racine du dépôt à chaque build, pour que l'APK
        # reflète toujours exactement ce qui est déployé sur le web.
        run: |
          ASSETS=android/app/src/main/assets
          rm -rf "$ASSETS/css" "$ASSETS/js" "$ASSETS/assets" "$ASSETS/config" "$ASSETS/netlify.toml"
          cp index.html manifest.json sw.js "$ASSETS/"
          cp -r css js assets config "$ASSETS/"
          echo "Fichiers synchronisés :"
          diff -rq css "$ASSETS/css" && diff -rq js "$ASSETS/js" && echo "OK : identiques à la racine"

      - name: Validate signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || (echo "Missing secret: KEYSTORE_BASE64" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "Missing secret: KEYSTORE_PASSWORD" && exit 1)
          test -n "$KEYSTORE_ALIAS" || (echo "Missing secret: KEYSTORE_ALIAS" && exit 1)
          test -n "$KEYSTORE_KEY_PASSWORD" || (echo "Missing secret: KEYSTORE_KEY_PASSWORD" && exit 1)

      - name: Decode and setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore.jks
          ls -lh android/keystore.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storeFile=keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEYSTORE_ALIAS
          keyPassword=$KEYSTORE_KEY_PASSWORD
          EOF

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Prepare APK artifact
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/app-release.apk "build-output/${APK_NAME}"
          ls -lh build-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medconnect-v2.6.0-apk
          path: build-output/medconnect-v2.6.0.apk
          if-no-files-found: error

      - name: Supprimer le keystore et ses secrets
        if: always()
        run: rm -f android/keystore.jks android/keystore.properties
