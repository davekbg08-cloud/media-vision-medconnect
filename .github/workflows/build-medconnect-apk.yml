name: Build MedConnect Android APK

# ⚠️ Déclenchement MANUEL uniquement (workflow_dispatch). Ce build
# produit un APK de RELEASE SIGNÉ, ce qui nécessite le keystore de
# signature — un secret qui n'est PAS dans le dépôt (public). Tant que
# le keystore n'est pas fourni via les secrets GitHub, ce workflow ne
# doit se lancer qu'à la demande, jamais automatiquement à chaque push
# (sinon il échoue systématiquement). Pour publier au Play Store,
# construire l'APK localement (où le keystore est présent) ou configurer
# les secrets GitHub (KEYSTORE_BASE64, STORE_PASSWORD, KEY_ALIAS,
# KEY_PASSWORD) puis réactiver le déclencheur push.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  APK_NAME: medconnect-v2.4.apk

jobs:
  # Porte d'entrée obligatoire : aucun APK n'est construit si les tests
  # (node --test tests/*.test.js) ne passent pas. Tourne sur push ET
  # pull_request, y compris pour un changement qui ne touche que
  # tests/** (auparavant hors du déclencheur — un test cassé seul ne
  # lançait jamais la CI).
  test:
    name: Tests (node --test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run test suite
        run: npm test

  build-apk:
    name: Build APK v2.4
    runs-on: ubuntu-latest
    needs: test
    # L'APK ne se construit que sur push vers main (jamais pour une
    # simple pull request) — comportement inchangé par rapport à avant,
    # seul le déclencheur pull_request ajouté ci-dessus concerne le job
    # "test" (retour rapide sur une PR, sans construire l'APK).
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Prepare APK artifact
        run: |
          mkdir -p build-output
          cp android/app/build/outputs/apk/release/app-release.apk "build-output/${APK_NAME}"
          ls -lh build-output

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medconnect-v2.4-apk
          path: build-output/medconnect-v2.4.apk
          if-no-files-found: error
