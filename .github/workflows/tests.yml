name: Tests MedConnect

# Retour rapide sur pull request (et déclenchement manuel), SANS
# reconstruire l'APK. Le déclencheur push vers main a été retiré :
# .github/workflows/build-medconnect-apk.yml a son propre job "test"
# qui gate déjà le build sur push vers main pour les mêmes chemins —
# le garder ici en plus faisait tourner la suite deux fois par push
# (minutes Actions gaspillées, alors que la facturation est justement
# la contrainte).

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Suite de tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Nécessaire depuis l'ajout de @firebase/rules-unit-testing,
      # firebase et firebase-tools (devDependencies) — la suite ne
      # dépendait d'aucun paquet npm auparavant.
      - name: Install dependencies
        run: npm ci

      # PARTIE O — ordre imposé : secrets → lint → tests unitaires →
      # E2E navigateur → règles Firestore, avant tout build.
      - name: Scan de secrets
        run: npm run security:scan

      # Filet statique (chantier D) : échoue uniquement sur les ERREURS
      # ESLint (les warnings du code existant restent informatifs).
      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm test

      # E2E « shell » (chantier D) : socle UI dans un vrai Chromium.
      # Le navigateur n'est pas préinstallé sur le runner → on l'installe.
      - name: Installer le navigateur Playwright
        run: npx playwright install --with-deps chromium

      - name: Tests E2E (Playwright)
        run: npm run e2e

      - name: Archiver le rapport E2E en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Set up JDK (émulateur Firestore)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Tests des règles Firestore (émulateur)
        run: npm run test:rules
