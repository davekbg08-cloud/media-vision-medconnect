name: Sauvegarde Firestore (export NDJSON)

# Planifiée + déclenchement manuel. Contrairement au build APK/bureau,
# ce workflow ne modifie rien dans le dépôt — il lit Firestore via
# l'Admin SDK (gratuit, ne nécessite PAS le plan Blaze) et publie
# l'export comme artefact de run, jamais commité dans git (données
# potentiellement volumineuses et sensibles, à ne jamais faire
# transiter par l'historique du dépôt).
on:
  workflow_dispatch:
  schedule:
    # Chaque jour à 02:00 UTC — horaire creux, hors des heures de
    # bureau habituelles en Afrique centrale/de l'Ouest (UTC+1/+2/+3).
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  backup:
    name: Export Firestore
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Vérifier les secrets requis
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIRESTORE_BACKUP_ENCRYPTION_KEY: ${{ secrets.FIRESTORE_BACKUP_ENCRYPTION_KEY }}
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON" || (echo "Secret manquant : FIREBASE_SERVICE_ACCOUNT_JSON (voir docs/BACKUP_RESTORE_RUNBOOK.md)" && exit 1)
          # Correctif (chantier sécurité, section 12/13) : bug confirmé —
          # ce workflow publiait jusqu'ici l'export NDJSON en clair
          # comme artefact ; désormais chiffré (voir étape ci-dessous),
          # donc ce secret est requis pour que la sauvegarde aboutisse.
          test -n "$FIRESTORE_BACKUP_ENCRYPTION_KEY" || (echo "Secret manquant : FIRESTORE_BACKUP_ENCRYPTION_KEY (voir docs/BACKUP_RESTORE_RUNBOOK.md)" && exit 1)

      - name: Installer firebase-admin (non permanent, cf. scripts/backup-firestore.mjs)
        run: npm install firebase-admin --no-save

      - name: Écrire la clé de compte de service
        # Le secret contient directement le JSON du compte de service
        # (pas de base64 : GitHub Actions accepte un secret multi-ligne
        # tel quel, une étape d'encodage locale n'apporte rien ici).
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > /tmp/firebase-service-account.json

      - name: Exporter Firestore
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
        run: node scripts/backup-firestore.mjs --out backup-output

      - name: Supprimer la clé décodée
        if: always()
        run: rm -f /tmp/firebase-service-account.json

      - name: Chiffrer l'export (gpg symétrique AES256) — jamais de NDJSON en clair publié
        env:
          FIRESTORE_BACKUP_ENCRYPTION_KEY: ${{ secrets.FIRESTORE_BACKUP_ENCRYPTION_KEY }}
        run: |
          VERSION=$(node -e "console.log(require('./config/app-version.json').version)")
          node scripts/encrypt-backup.mjs --in backup-output --out backup-output.tar.gz.gpg --version "$VERSION"

      - name: Supprimer l'export en clair (jamais publié)
        if: always()
        run: rm -rf backup-output

      - name: Publier l'archive chiffrée + le manifeste public comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: firestore-backup-${{ github.run_id }}
          path: |
            backup-output.tar.gz.gpg
            backup-output.tar.gz.gpg.manifest.json
          retention-days: 30
          if-no-files-found: error
